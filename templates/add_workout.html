{% extends "base.html" %}

{% block content %}
<h1>Добавить тренировку</h1>
<form method="post">
    <label for="exercise_id">Упражнение:</label>
    <select name="exercise_id" id="exercise_id" required>
        {% for ex in exercises %}
            <option value="{{ ex.id }}">{{ ex.name }}</option>
        {% endfor %}
    </select><br>
    <label for="sets">Подходы:</label>
    <input type="number" name="sets" id="sets" required><br>
    <label for="reps">Повторения:</label>
    <input type="number" name="reps" id="reps" required><br>
    <label for="weight">Вес (кг):</label>
    <input type="number" step="0.5" name="weight" id="weight" required><br>
    <button type="submit">Сохранить</button>
</form>
{% endblock %}
